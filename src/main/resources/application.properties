spring.application.name=demo

# Google Maps / Places — restrict this key in Google Cloud Console (HTTP referrers / APIs)
google.maps.api.key=AIzaSyD3yhCdBAgTR_Ny0SgMGf_hJlvLDnGPyQU

# H2 in-memory DB for per-dealer vehicle inventory
spring.datasource.url=jdbc:h2:mem:dealerapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Synthetic inventory per Google place_id (unique lineup per dealer). Set false for production — use real DB rows only.
app.inventory.demo-seed=true

# Fetch phone + website (extra Places Details API calls; capped for cost)
app.places.details.enabled=true
app.places.details.max-dealers=60
